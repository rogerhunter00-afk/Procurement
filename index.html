<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procurement Request Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Procurement Request Builder</h1>
      <p class="subtitle">
        Upload a quote (text or PDF file) and/or paste the content below, then generate your procurement request HTML file.
      </p>

      <section class="panel">
        <h2>1) Add your quote details</h2>

        <label for="quoteFile">Upload quote file (TXT/CSV/MD/PDF)</label>
        <input id="quoteFile" type="file" accept=".txt,.csv,.md,.pdf,text/plain,application/pdf" />
        <p id="fileStatus" class="helper">No file selected yet.</p>

        <label for="sourceText">Or paste quote text</label>
        <textarea id="sourceText" placeholder="Paste supplier quote text here..."></textarea>

        <label for="requesterPreset">Requester</label>
        <select id="requesterPreset">
          <option value="jacek-lewandowski">Jacek Lewandowski - Group Operations Manager</option>
          <option value="custom">Other (enter below)</option>
        </select>

        <div class="split-fields">
          <div>
            <label for="customRequesterName">Custom requester name</label>
            <input id="customRequesterName" type="text" placeholder="Enter requester name" />
          </div>
          <div>
            <label for="customRequesterTitle">Custom requester job title</label>
            <input id="customRequesterTitle" type="text" placeholder="Enter requester job title" />
          </div>
        </div>

        <div class="actions">
          <button id="generateBtn">Generate HTML file</button>
        </div>
      </section>

      <section class="panel">
        <h2>2) Open your generated file</h2>
        <p class="helper">Click the file below to open it in a new tab.</p>
        <a id="htmlFileLink" class="file-link disabled" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">
          procurement-request.html
        </a>
      </section>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
